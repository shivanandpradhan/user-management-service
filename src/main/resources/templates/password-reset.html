<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Password Reset Request</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }
        .button {
            display: inline-block;
            padding: 10px 20px;
            background-color: #3498db;
            color: white !important;
            text-decoration: none;
            border-radius: 4px;
            margin: 15px 0;
        }
        .footer {
            margin-top: 20px;
            padding-top: 10px;
            border-top: 1px solid #eee;
            font-size: 0.9em;
            color: #7f8c8d;
        }
        .code {
            font-family: monospace;
            font-size: 1.2em;
            letter-spacing: 2px;
            background: #f5f5f5;
            padding: 10px;
            display: inline-block;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <h1 class="header">Password Reset Request</h1>

    <p>Hello,</p>

    <p>We received a request to reset your password. Click the button below to proceed:</p>

    <a th:href="${resetLink}" class="button">Reset Password</a>

    <p>This link will expire in <strong th:text="${expiryHours} + ' hours'">X hours</strong>.</p>

    <p>If you didn't request this password reset, please ignore this email.</p>

    <div class="footer">
        <p>Best regards,<br>The Security Team</p>
        <p>© <span th:text="${#temporals.format(#temporals.createNow(), 'yyyy')}"></span> Let's Code With SNP</p>
    </div>
</body>
</html>
