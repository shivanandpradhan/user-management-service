<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Your Verification Code</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            color: #2c3e50;
            border-bottom: 2px solid #2ecc71;
            padding-bottom: 10px;
        }
        .otp-container {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 5px;
            margin: 20px 0;
            text-align: center;
        }
        .otp-code {
            font-family: monospace;
            font-size: 24px;
            letter-spacing: 5px;
            color: #e74c3c;
            font-weight: bold;
        }
        .note {
            font-size: 0.9em;
            color: #7f8c8d;
        }
        .footer {
            margin-top: 20px;
            padding-top: 10px;
            border-top: 1px solid #eee;
            font-size: 0.9em;
            color: #7f8c8d;
        }
    </style>
</head>
<body>
<h1 class="header">Your Verification Code</h1>

<p>Hello,</p>

<p>Here is your one-time password (OTP) for authentication:</p>

<div class="otp-container">
    <div class="otp-code" th:text="${otp}">123456</div>
</div>

<p class="note">This code is valid for <strong th:text="${validMinutes} + ' minutes'">5 minutes</strong>.</p>

<p>If you didn't request this code, please secure your account immediately.</p>

<div class="footer">
    <p>Best regards,<br>The Security Team</p>
    <p>© <span th:text="${#temporals.format(#temporals.createNow(), 'yyyy')}"></span> Let's Code With SNP</p>
</div>
</body>
</html>
