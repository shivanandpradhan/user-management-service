spring:
  application:
    name: user-management-service
  main:
    allow-bean-definition-overriding: true
  data:
    mongodb:
      uri: mongodb://localhost:27017/userdb
      auto-index-creation: true
      custom-converters: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: shiva2000shivam@gmail.com
    password: abvcjhgfdhhgfghfsfh
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
        transport:
          protocol: smtp
          timeout: 5000
          write-timeout: 5000
          connection-timeout: 5000

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: user-management-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: com.snp.dev.user_management_service.serializers.EmailMessageSerializer
      properties:
        retries: 3
        acks: all
        delivery.timeout.ms: 30000
        request.timeout.ms: 15000
  redis:
    host: localhost
    port: 6379

